name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17 # runs Gradle; compilation uses the Java 11 toolchain
      - uses: gradle/actions/setup-gradle@v4
      # build runs the tests, which include data-pack schema validation
      - run: ./gradlew build
